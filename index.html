<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="style.css" rel="stylesheet"/>
</head>
<body>
    <script src="script.js"></script>
    <h1>Calculator</h1>
    <div class="calc">
        This is the calculator
        <div class="screen">
            This is the screen
        </div>
        <div class="buttons">
            <div class="numButtons">
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>0</button>
                <button>.</button>
                <button>=</button>
            </div>
            <div class="operators">
                <button>/</button>
                <button>x</button>
                <button>-</button>
                <button>+</button>
            </div>
        </div>
    </div>
</body>
</html>
